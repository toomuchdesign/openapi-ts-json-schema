openapi: 3.0.3
info:
  title: Xquik API
  version: 1.0.0
servers:
  - url: https://xquik.com
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: x-api-key
paths:
  /api/v1/x/tweets/search:
    get:
      operationId: searchTweets
      security:
        - apiKey: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - text
                      properties:
                        id:
                          type: string
                        text:
                          type: string
